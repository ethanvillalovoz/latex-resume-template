name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Compile all templates
        uses: xu-cheng/latex-action@v4
        with:
          root_file: |
            src/resume.tex
            src/starter-resume.tex
            src/cv/cv.tex
            src/cv/starter-cv.tex
          work_in_root_file_dir: true
          latexmk_use_xelatex: true
          texlive_version: 2026
          os: debian

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Verify PDFs
        run: |
          python -m pip install -r requirements-dev.txt
          python scripts/verify_pdfs.py

      - name: Upload compiled documents
        uses: actions/upload-artifact@v7
        with:
          name: latex-documents
          retention-days: 7
          if-no-files-found: error
          path: |
            src/resume.pdf
            src/starter-resume.pdf
            src/cv/cv.pdf
            src/cv/starter-cv.pdf
