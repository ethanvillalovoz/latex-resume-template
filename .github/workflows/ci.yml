name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile resume.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex
          working_directory: src
          latexmk_use_xelatex: true

      - name: Compile starter-resume.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: starter-resume.tex
          working_directory: src
          latexmk_use_xelatex: true

      - name: Compile cv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          working_directory: src/cv
          latexmk_use_xelatex: true

      - name: Compile starter-cv.tex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: starter-cv.tex
          working_directory: src/cv
          latexmk_use_xelatex: true

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: latex-documents
          path: |
            src/resume.pdf
            src/starter-resume.pdf
            src/cv/cv.pdf
            src/cv/starter-cv.pdf
