name: Feature request
description: Propose a focused template, documentation, or build improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor workflow is currently difficult?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest useful solution and any visual effect.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Resume template
        - Academic CV template
        - Build and PDF verification
        - Documentation
        - Accessibility or text extraction
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
